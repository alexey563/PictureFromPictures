<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотомозаика</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Создать фотомозаику</h1>
        <div class="controls">
            <div class="tabs">
                <button class="tab-btn active" data-tab="manual">Вручную</button>
                <button class="tab-btn" data-tab="auto">Автоматически</button>
            </div>

            <div id="manual-tab" class="tab-content">
                <div class="input-group">
                    <label for="targetImage">Основное изображение:</label>
                    <input type="file" id="targetImage" accept="image/*">
                </div>
                <div class="input-group">
                    <label for="sourceImages">Пул маленьких изображений:</label>
                    <input type="file" id="sourceImages" accept="image/*" multiple>
                </div>
            </div>

            <div id="auto-tab" class="tab-content" style="display:none;">
                <div class="input-group">
                    <label for="targetKeyword">Что собрать? (напр. "nature"):</label>
                    <input type="text" id="targetKeyword" placeholder="Введите тему основного фото">
                </div>
                <div class="input-group">
                    <label for="sourceKeyword">Из чего собрать? (напр. "cats"):</label>
                    <input type="text" id="sourceKeyword" placeholder="Введите тему для маленьких фото">
                </div>
                <div class="input-group">
                    <label for="sourceCount">Количество фото в пуле (10-300):</label>
                    <input type="number" id="sourceCount" value="100" min="10" max="300">
                </div>
            </div>

            <div class="input-group">
                <label for="renderScale">Качество (размер для печати):</label>
                <select id="renderScale">
                    <option value="1">Для экрана (72 DPI)</option>
                    <option value="2">Хорошее (HD)</option>
                    <option value="4" selected>Печать (Ultra HD / 300 DPI)</option>
                    <option value="6">Огромный холст (8K)</option>
                </select>
            </div>
            <div class="input-group-row">
                <input type="checkbox" id="keepOriginalColors" checked>
                <label for="keepOriginalColors">Оставлять оригинальные цвета фото</label>
            </div>
            <div class="input-group" id="blendControl" style="display:none;">
                <label for="blendOpacity">Наложение цвета оригинала:</label>
                <input type="range" id="blendOpacity" min="0" max="0.8" step="0.1" value="0.3">
            </div>
            <div class="button-group">
                <button id="generateBtn">Создать мозаику</button>
                <button id="downloadBtn" style="display:none; background-color: #4caf50;">Скачать в HD качество</button>
            </div>
        </div>
        <div id="status" class="status">Готов к работе.</div>
        <div class="progress-container" id="progressContainer" style="display:none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="result-container">
            <canvas id="resultCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
