<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотомозаика</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Создать фотомозаику</h1>
        <div class="controls">
            <div class="input-group">
                <label for="targetImage">Выберите основное изображение:</label>
                <input type="file" id="targetImage" accept="image/*">
            </div>
            <div class="input-group">
                <label for="sourceImages">Выберите много маленьких изображений (пул):</label>
                <input type="file" id="sourceImages" accept="image/*" multiple>
            </div>
            <div class="input-group">
                <label for="cellSize">Размер ячейки (пиксели):</label>
                <input type="number" id="cellSize" value="20" min="5" max="100">
            </div>
            <button id="generateBtn">Создать мозаику</button>
        </div>
        <div id="status" class="status">Готов к работе.</div>
        <div class="progress-container" id="progressContainer" style="display:none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="result-container">
            <canvas id="resultCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
